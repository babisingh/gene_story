server {
    listen __PORT__;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the React app — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the FastAPI backend.
    # Using a variable for proxy_pass forces nginx to re-resolve the hostname
    # on every request (via the resolver) instead of at startup — this prevents
    # nginx from failing to start if the API container isn't ready yet.
    location /api/ {
        resolver               __DNS_RESOLVER__ valid=30s ipv6=off;
        set                    $backend __API_URL__;
        proxy_pass             $backend;
        proxy_set_header       Host __API_HOST__;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_ssl_server_name  on;

        # Required for Server-Sent Events (story streaming):
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}
