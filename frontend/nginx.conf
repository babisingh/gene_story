server {
    listen __PORT__;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the React app — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the FastAPI backend.
    # API_URL and API_HOST are substituted at container startup by docker-entrypoint.sh.
    # proxy_pass with a static URL resolves the hostname once at nginx startup;
    # Railway's internal DNS registers service names before containers start, so
    # *.railway.internal hostnames are resolvable even before the API is ready.
    location /api/ {
        proxy_pass             __API_URL__;
        proxy_set_header       Host __API_HOST__;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_ssl_server_name  on;

        # Required for Server-Sent Events (story streaming):
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}
