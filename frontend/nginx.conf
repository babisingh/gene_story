server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the React app — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the FastAPI backend container
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Required for Server-Sent Events (story streaming) to work:
        # disables Nginx's response buffering so chunks reach the browser immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}
